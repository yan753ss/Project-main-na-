services:
  user:
    build: ./user_service
    ports: ["8000:8000"]
    env_file:
      - .env
    environment:
      JWT_SECRET: ${JWT_SECRET:-beta-secret-key-change-me}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRES_MINUTES: ${JWT_EXPIRES_MINUTES:-60}

  product:
    build: ./product_service
    ports: ["8001:8001"]
    env_file:
      - .env
    environment:
      PRODUCT_STORAGE: ${PRODUCT_STORAGE:-mongodb}
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017}
      MONGODB_DB: ${MONGODB_DB:-shop}
      MONGODB_COLLECTION: ${MONGODB_COLLECTION:-products}
    depends_on:
      - mongo

  order:
    build: ./order_service
    ports: ["8002:8002"]
    environment:
      ORDER_STORAGE: ${ORDER_STORAGE:-mongodb}
      ORDER_MONGODB_URI: ${ORDER_MONGODB_URI:-mongodb://mongo:27017}
      ORDER_MONGODB_DB: ${ORDER_MONGODB_DB:-shop}
      ORDER_MONGODB_COLLECTION: ${ORDER_MONGODB_COLLECTION:-orders}
    depends_on:
      - mongo

  notification:
    build: ./notification_service
    ports: ["8003:8003"]
    env_file:
      - .env
    environment:
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
      RABBITMQ_QUEUE: ${RABBITMQ_QUEUE:-notifications}
    depends_on:
      - rabbitmq

  mongo:
    image: mongo:4.4
    ports: ["27017:27017"]

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-shop_db}
      POSTGRES_USER: ${POSTGRES_USER:-shop_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shop_pass}
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init_schema.sql:/docker-entrypoint-initdb.d/01-init_schema.sql:ro

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  postgres_data:
